name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-26
    
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: "26" 
      
    - name: Show Xcode version
      run: xcodebuild -version
      
    # Alternative: Keep caching with better invalidation
    # Uncomment the following section if you want to keep caching
    # - name: Cache derived data (with aggressive invalidation)
    #   uses: actions/cache@v3
    #   with:
    #     path: ~/Library/Developer/Xcode/DerivedData
    #     key: ${{ runner.os }}-derived-data-${{ github.sha }}-${{ hashFiles('**/*.swift', '**/*.h', '**/*.m', '**/*.mm', '**/*.c', '**/*.cpp', '**/*.xcodeproj/**', '**/*.xcworkspace/**') }}
    #     restore-keys: |
    #       ${{ runner.os }}-derived-data-${{ github.sha }}-
    #       ${{ runner.os }}-derived-data-
      
    - name: Clean derived data and build artifacts
      run: |
        # Remove all derived data
        rm -rf ~/Library/Developer/Xcode/DerivedData
        rm -rf ~/Library/Caches/com.apple.dt.Xcode
        
        # Clean Xcode build folder for the main scheme only
        xcodebuild clean -project gr4vy-swiftui.xcodeproj -scheme "Gr4vy SwiftUI" -configuration Debug
        
        # Clean any remaining build artifacts
        find . -name "*.build" -type d -exec rm -rf {} + 2>/dev/null || true
        find . -name "*.xcuserdata" -type d -exec rm -rf {} + 2>/dev/null || true
        
        # Clean test-specific artifacts
        find . -name "TestResults.xcresult" -type d -exec rm -rf {} + 2>/dev/null || true
        find . -name "*.xcresult" -type d -exec rm -rf {} + 2>/dev/null || true
    
    - name: Resolve SPM (prewarm)
      run: xcodebuild -resolvePackageDependencies -project gr4vy-swiftui.xcodeproj -scheme "Gr4vy SwiftUI"

    - name: Build SwiftUI Sample App
      run: |
        # Find an available iPhone 16 simulator (excluding iPhone 16e)
        # This handles cases where multiple iPhone 16 simulators exist with the same OS version
        SIMULATOR_ID=$(xcrun simctl list devices available | grep -i "iPhone 16" | grep -v "iPhone 16e" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
        if [ -z "$SIMULATOR_ID" ]; then
          echo "No iPhone 16 simulator found, using generic iOS Simulator destination"
          xcodebuild build \
            -project gr4vy-swiftui.xcodeproj \
            -scheme "Gr4vy SwiftUI" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
        else
          echo "Using iPhone 16 simulator: $SIMULATOR_ID"
          xcodebuild build \
            -project gr4vy-swiftui.xcodeproj \
            -scheme "Gr4vy SwiftUI" \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
        fi
          
    - name: Run SwiftLint
      run: |
        if which swiftlint >/dev/null; then
          swiftlint
        else
          echo "SwiftLint not installed, skipping..."
        fi
